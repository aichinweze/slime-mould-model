steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - Flow_Control
      - --region=us-central1
      - --source=.flow_control
      - --entry-point=run_flow_control
      - --trigger-http
      - --runtime=python314

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - Worker_A
      - --region=us-central1
      - --source=.worker_a
      - --entry-point=process_routed_request
      - --trigger-http
      - --runtime=python314

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - Worker_B
      - --region=us-central1
      - --source=.worker_b
      - --entry-point=process_routed_request
      - --trigger-http
      - --runtime=python314

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - Worker_C
      - --region=us-central1
      - --source=.worker_c
      - --entry-point=process_routed_request
      - --trigger-http
      - --runtime=python314

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - functions
      - deploy
      - Metrics_Processor
      - --region=us-central1
      - --source=.metrics_processor
      - -entry-point=update_metrics
      - --trigger-topic=worker-success-topic
      - --runtime=python314

